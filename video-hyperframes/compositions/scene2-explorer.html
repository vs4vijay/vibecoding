      (function () {
        const root = document.querySelector('[data-composition-id="scene2-explorer"]');
        const tl = gsap.timeline({ paused: true });
        const header = root.querySelector(".header");
        const sectionLabel = root.querySelector(".section-label");
        const sectionTitle = root.querySelector(".section-title");
        const searchBar = root.querySelector(".search-bar");
        const fundTable = root.querySelector(".fund-table");

        tl.set(header, { y: -80, opacity: 0 });
        tl.set(sectionLabel, { y: 30, opacity: 0 });
        tl.set(sectionTitle, { y: 30, opacity: 0 });
        tl.set(searchBar, { y: 20, opacity: 0 });
        tl.set(fundTable, { y: 30, opacity: 0 });

        tl.to(header, { y: 0, opacity: 1, duration: 0.5, ease: "power3.out" }, 0);
        tl.to(sectionLabel, { y: 0, opacity: 1, duration: 0.4, ease: "power2.out" }, 0.2);
        tl.to(sectionTitle, { y: 0, opacity: 1, duration: 0.4, ease: "power2.out" }, 0.3);
        tl.to(searchBar, { y: 0, opacity: 1, duration: 0.5, ease: "power3.out" }, 0.4);
        tl.to(fundTable, { y: 0, opacity: 1, duration: 0.5, ease: "power3.out" }, 0.6);

        window.__timelines["scene2-explorer"] = tl;
