services:
  postgres:
    image: ghcr.io/citusdata/pg_cron-pg:16-alpine
    # Fallback if the citusdata image isn't available in your registry, swap to:
    #   image: postgres:16-alpine
    # and apt-get install postgresql-16-cron manually (see README).
    container_name: syncbase_pg
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: syncbase
    ports:
      - "5432:5432"
    volumes:
      - syncbase_pgdata:/var/lib/postgresql/data
    command:
      - "postgres"
      - "-c"
      - "shared_preload_libraries=pg_cron"
      - "-c"
      - "cron.database_name=syncbase"

volumes:
  syncbase_pgdata:
